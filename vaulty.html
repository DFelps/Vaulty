<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulty - Gerenciador de Senhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Animation for switching screens */
        .fade-enter {
            opacity: 0;
        }
        .fade-enter-active {
            opacity: 1;
            transition: opacity 300ms ease-in;
        }
        .fade-exit {
            opacity: 1;
        }
        .fade-exit-active {
            opacity: 0;
            transition: opacity 300ms ease-out;
        }
        
        /* Password strength indicator */
        .strength-meter {
            height: 3px;
            transition: all 0.3s;
        }
        .strength-0 {
            width: 20%;
            background-color: #ef4444;
        }
        .strength-1 {
            width: 40%;
            background-color: #f59e0b;
        }
        .strength-2 {
            width: 60%;
            background-color: #f59e0b;
        }
        .strength-3 {
            width: 80%;
            background-color: #10b981;
        }
        .strength-4 {
            width: 100%;
            background-color: #10b981;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="container mx-auto w-full max-w-md">
        <!-- Login Screen -->
        <div id="login-screen" class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="bg-indigo-600 py-4 px-6">
                <h1 class="text-2xl font-bold text-white text-center">Vaulty</h1>
                <p class="text-indigo-200 text-center text-sm">Seu gerenciador de senhas seguro</p>
            </div>
            
            <div class="p-6">
                <div class="mb-6 text-center">
                    <i class="fas fa-lock-open text-5xl text-indigo-500 mb-4"></i>
                    <h2 class="text-xl font-semibold text-gray-800">Acesse seu cofre</h2>
                    <p class="text-gray-500 text-sm">Digite sua chave mestra para continuar</p>
                </div>
                
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="master-password" class="block text-sm font-medium text-gray-700 mb-1">Chave Mestra</label>
                        <div class="relative">
                            <input 
                                id="master-password" 
                                type="password" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="Digite sua chave mestra"
                                required
                            >
                            <button type="button" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600" onclick="togglePasswordVisibility('master-password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">Lembrar de mim</label>
                        </div>
                    </div>
                    
                    <div>
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            <i class="fas fa-unlock-alt mr-2"></i> Desbloquear
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-xs text-center text-gray-500">Vaulty v1.0.0 - Seus dados são criptografados localmente</p>
            </div>
        </div>
        
        <!-- Password Manager Screen (hidden by default) -->
        <div id="password-manager-screen" class="bg-white rounded-lg shadow-lg overflow-hidden hidden">
            <div class="bg-indigo-600 py-4 px-6 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white">Vaulty</h1>
                    <p class="text-indigo-200 text-xs">Seu cofre de senhas</p>
                </div>
                <button id="logout-btn" class="text-indigo-200 hover:text-white">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <div class="relative w-full max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </div>
                    <input 
                        type="text" 
                        id="search-passwords" 
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                        placeholder="Buscar senhas..."
                    >
                </div>
            </div>
            
            <div class="h-64 overflow-y-auto">
                <div id="password-list" class="divide-y divide-gray-200">
                    <!-- Password items will be added here dynamically -->
                    <div class="text-center py-10 text-gray-500">
                        <i class="fas fa-lock-open text-3xl mb-2"></i>
                        <p>Nenhuma senha cadastrada ainda</p>
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-200 bg-gray-50">
                <button id="add-password-btn" class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <i class="fas fa-plus mr-2"></i> Adicionar Senha
                </button>
            </div>
        </div>
        
        <!-- Add Password Modal (hidden by default) -->
        <div id="add-password-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">Adicionar Nova Senha</h3>
                </div>
                
                <form id="add-password-form" class="p-6 space-y-4">
                    <div>
                        <label for="service-name" class="block text-sm font-medium text-gray-700 mb-1">Serviço/Website</label>
                        <input 
                            type="text" 
                            id="service-name" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                            placeholder="Ex: Gmail, Netflix"
                            required
                        >
                    </div>
                    
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nome de usuário/E-mail</label>
                        <input 
                            type="text" 
                            id="username" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                            placeholder="Seu nome de usuário"
                            required
                        >
                    </div>
                    
                    <div>
                        <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="new-password" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="Digite a senha"
                                required
                                oninput="checkPasswordStrength(this.value)"
                            >
                            <button type="button" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600" onclick="togglePasswordVisibility('new-password')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button type="button" class="absolute right-10 top-2.5 text-gray-400 hover:text-gray-600" onclick="generatePassword()">
                                <i class="fas fa-random"></i>
                            </button>
                        </div>
                        <div class="mt-1 flex items-center">
                            <div id="password-strength" class="strength-meter strength-0 rounded-full"></div>
                            <span id="strength-text" class="ml-2 text-xs text-gray-500">Fraca</span>
                        </div>
                    </div>
                    
                    <div>
                        <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Notas (opcional)</label>
                        <textarea 
                            id="notes" 
                            rows="2" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                            placeholder="Qualquer informação adicional"
                        ></textarea>
                    </div>
                </form>
                
                <div class="px-6 py-4 border-t border-gray-200 flex justify-end space-x-3">
                    <button type="button" id="cancel-add-password" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancelar
                    </button>
                    <button type="button" id="save-password" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Salvar Senha
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const passwordManagerScreen = document.getElementById('password-manager-screen');
        const loginForm = document.getElementById('login-form');
        const logoutBtn = document.getElementById('logout-btn');
        const addPasswordBtn = document.getElementById('add-password-btn');
        const addPasswordModal = document.getElementById('add-password-modal');
        const cancelAddPassword = document.getElementById('cancel-add-password');
        const savePasswordBtn = document.getElementById('save-password');
        const passwordList = document.getElementById('password-list');
        const searchPasswords = document.getElementById('search-passwords');
        
        // Sample data - in a real app, this would be encrypted and stored securely
        let passwords = [];
        
        // Event Listeners
        loginForm.addEventListener('submit', handleLogin);
        logoutBtn.addEventListener('click', handleLogout);
        addPasswordBtn.addEventListener('click', () => addPasswordModal.classList.remove('hidden'));
        cancelAddPassword.addEventListener('click', () => addPasswordModal.classList.add('hidden'));
        savePasswordBtn.addEventListener('click', handleAddPassword);
        searchPasswords.addEventListener('input', filterPasswords);
        
        // Functions
        function handleLogin(e) {
            e.preventDefault();
            const masterPassword = document.getElementById('master-password').value;
            
            // In a real app, you would verify the master password hash
            if (masterPassword.length > 0) {
                // Simulate loading
                const submitBtn = e.target.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Verificando...';
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    loginScreen.classList.add('hidden');
                    passwordManagerScreen.classList.remove('hidden');
                    loadPasswords();
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }, 1000);
            }
        }
        
        function handleLogout() {
            passwordManagerScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            document.getElementById('master-password').value = '';
        }
        
        function loadPasswords() {
            // In a real app, you would decrypt the passwords here
            if (passwords.length === 0) {
                passwordList.innerHTML = `
                    <div class="text-center py-10 text-gray-500">
                        <i class="fas fa-lock-open text-3xl mb-2"></i>
                        <p>Nenhuma senha cadastrada ainda</p>
                    </div>
                `;
            } else {
                renderPasswordList();
            }
        }
        
        function handleAddPassword() {
            const serviceName = document.getElementById('service-name').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('new-password').value;
            const notes = document.getElementById('notes').value;
            
            if (serviceName && username && password) {
                const newPassword = {
                    id: Date.now(),
                    service: serviceName,
                    username: username,
                    password: password,
                    notes: notes,
                    createdAt: new Date().toISOString()
                };
                
                passwords.push(newPassword);
                renderPasswordList();
                
                // Reset form and close modal
                document.getElementById('add-password-form').reset();
                document.getElementById('password-strength').className = 'strength-meter strength-0 rounded-full';
                document.getElementById('strength-text').textContent = 'Fraca';
                addPasswordModal.classList.add('hidden');
            }
        }
        
        function renderPasswordList(filteredPasswords = null) {
            const itemsToRender = filteredPasswords || passwords;
            
            if (itemsToRender.length === 0) {
                passwordList.innerHTML = `
                    <div class="text-center py-10 text-gray-500">
                        <i class="fas fa-search text-3xl mb-2"></i>
                        <p>Nenhum resultado encontrado</p>
                    </div>
                `;
                return;
            }
            
            passwordList.innerHTML = itemsToRender.map(password => `
                <div class="p-4 hover:bg-gray-50 group" data-id="${password.id}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="flex-shrink-0 h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center">
                                <i class="fas fa-lock text-indigo-600"></i>
                            </div>
                            <div>
                                <h3 class="text-sm font-medium text-gray-900">${password.service}</h3>
                                <p class="text-sm text-gray-500">${password.username}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="text-gray-400 hover:text-indigo-600" onclick="copyToClipboard('${password.username}')" title="Copiar usuário">
                                <i class="fas fa-user"></i>
                            </button>
                            <button class="text-gray-400 hover:text-indigo-600" onclick="copyToClipboard('${password.password}')" title="Copiar senha">
                                <i class="fas fa-key"></i>
                            </button>
                            <button class="text-gray-400 hover:text-red-600" onclick="deletePassword(${password.id})" title="Excluir">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    ${password.notes ? `<div class="mt-2 text-xs text-gray-500 pl-13">${password.notes}</div>` : ''}
                </div>
            `).join('');
        }
        
        function filterPasswords() {
            const searchTerm = searchPasswords.value.toLowerCase();
            if (searchTerm === '') {
                renderPasswordList();
                return;
            }
            
            const filtered = passwords.filter(p => 
                p.service.toLowerCase().includes(searchTerm) || 
                p.username.toLowerCase().includes(searchTerm) ||
                (p.notes && p.notes.toLowerCase().includes(searchTerm))
            );
            
            renderPasswordList(filtered);
        }
        
        function deletePassword(id) {
            passwords = passwords.filter(p => p.id !== id);
            renderPasswordList();
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Show a temporary notification
                const notification = document.createElement('div');
                notification.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded-md shadow-lg';
                notification.textContent = 'Copiado para a área de transferência!';
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                    setTimeout(() => notification.remove(), 300);
                }, 2000);
            });
        }
        
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        function checkPasswordStrength(password) {
            const strengthMeter = document.getElementById('password-strength');
            const strengthText = document.getElementById('strength-text');
            
            // Simple password strength check
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            
            // Character type checks
            if (/[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            // Cap at 4 for our meter
            strength = Math.min(strength, 4);
            
            // Update UI
            strengthMeter.className = `strength-meter strength-${strength} rounded-full`;
            
            const strengthLabels = ['Muito fraca', 'Fraca', 'Moderada', 'Forte', 'Muito forte'];
            strengthText.textContent = strengthLabels[strength];
        }
        
        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+';
            let password = '';
            
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            const passwordInput = document.getElementById('new-password');
            passwordInput.value = password;
            passwordInput.type = 'text';
            passwordInput.nextElementSibling.querySelector('i').classList.replace('fa-eye', 'fa-eye-slash');
            
            checkPasswordStrength(password);
        }
    </script>
</body>
</html>
