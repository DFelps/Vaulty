<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulty - Gerenciador de Senhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body class="bg-gray-100 flex items-center justify-center">
    <div class="container mx-auto w-full max-w-md">
        <!-- Login Screen -->
        <div id="login-screen" class="bg-white shadow-lg overflow-hidden">
            <div class="bg-indigo-600 py-4 px-6">
                <h1 class="text-2xl font-bold text-white text-center">Vaulty</h1>
                <p class="text-indigo-200 text-center text-sm">Seu gerenciador de senhas seguro</p>
            </div>
            
            <div class="p-6">
                <div class="mb-6 text-center">
                    <i class="fas fa-lock-open text-5xl text-indigo-500 mb-4"></i>
                    <h2 class="text-xl font-semibold text-gray-800">Acesse seu cofre</h2>
                    <p class="text-gray-500 text-sm">Digite sua chave mestra para continuar</p>
                </div>
                
                <form id="login-form" class="space-y-4">
                    <div>
                        <label for="master-password" class="block text-sm font-medium text-gray-700 mb-1">Chave Mestra</label>
                        <div class="relative">
                            <input 
                                id="master-password" 
                                type="password" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" 
                                placeholder="Digite sua chave mestra"
                                required
                            >
                            <button type="button" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600" onclick="togglePasswordVisibility('master-password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">Lembrar de mim</label>
                        </div>
                    </div>
                    
                    <div>
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            <i class="fas fa-unlock-alt mr-2"></i> Desbloquear
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200">
                <p class="text-xs text-center text-gray-500">Vaulty v1.0.0 - Seus dados são criptografados localmente</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          window.electronAPI.openPasswordWindow();
        });
      
        function togglePasswordVisibility(id) {
          const input = document.getElementById(id);
          input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
      
</body>
</html>
